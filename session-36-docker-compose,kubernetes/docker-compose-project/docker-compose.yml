services:
  backend:
    build: ./backend 
    container_name: backend
    restart: always
    ports:
      - "3000:3000"
    environment:
        DB_HOST: mysql
        DB_USER: root
        DB_PASSWORD: secret
        DB_NAME: appdb
  frontend:
    build: ./frontend
    container_name: frontend
    restart: always
    ports:
      - "5173:5173"

  mysql:
    image: mysql:latest
    container_name: mysql_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: secret 
      MYSQL_DATABASE: appdb
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:

#  volume is for persistent storage
#  network created automatically which is shared between all 3 containers