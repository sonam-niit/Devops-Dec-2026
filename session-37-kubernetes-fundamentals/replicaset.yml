apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx-rs
  labels:
    app: nginx 
    # match with service selector to redirect traffic
spec:
  # modify replicas according to your case
  replicas: 3
  selector:
    matchLabels:
      app: nginx 
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx

#  match Labels and template metadata used for Pod Selection Rule
#  like as i said 3 replicas it will match pod with same template and if count is 3 means all good

---

apiVersion: v1
kind: Service
metadata:
  name: rs-service
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
    - protocol: TCP
      port: 80 # this is docker port

# here when you trigger URL responce can be coming from any pod 