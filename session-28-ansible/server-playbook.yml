- name: deploy my app
  hosts: server1
  become: true

  tasks:
    - name: update API packages
      apt: 
        update_cache: yes
    - name: install nginx
      apt:
        name: nginx
        state: present # optional
    - name: Copy HTML file to default location
      copy:
        src: index.html
        dest: /var/www/html/index.html
    - name: Start Nginx
      service:
        name: nginx
        state: started
        enabled: yes
# verify by taking public ip in browser
# you can see default page of nginx
